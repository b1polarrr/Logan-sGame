<!DOCTYPE html>
<html lang="zh-CN">
<script src="https://cdn.jsdelivr.net/npm/protobufjs@7/dist/protobuf.min.js"></script>
<head>
    <meta charset="UTF-8">
    <title>Poker WebSocket 联调</title>
    <style>
        body { font-family: Consolas, monospace; padding: 24px; background: #1a1a2e; color: #eee; }
        button { margin: 8px 8px 8px 0; padding: 10px 16px; cursor: pointer; }
        #log { margin-top: 16px; padding: 12px; background: #0f0f1a; border: 1px solid #444; min-height: 200px; white-space: pre-wrap; }
        .ok { color: #6f6; }
        .err { color: #f66; }
    </style>
</head>
<body>
<h2>♠ 德州扑克 Netty 网关联调页</h2>
<label>房间号 <input id="roomId" value="666"></label>
<label>座位号 <input id="seatIndex" value="0" type="number" min="0" max="5"></label>
<label>加注目标总额 <input id="raiseAmount" value="40" type="number"></label>
<br>
<label>人数 <input id="maxSeats" value="6" type="number" min="2" max="9"></label>
<label>小盲 <input id="smallBlind" value="10" type="number"></label>
<label>大盲 <input id="bigBlind" value="20" type="number"></label>
<p>网关地址：<code>ws://localhost:8888/ws</code>（路径必须是 <code>/ws</code>）</p>
<button onclick="connectWs()">连接</button>
<button onclick="sendAction('CREATE_ROOM')" id="btnCreate" disabled>创建房间(德州)</button>
<button onclick="sendAction('LIST_ROOMS')" id="btnList" disabled>刷新列表</button>
<button onclick="sendAction('JOIN_ROOM')" id="btnJoin" disabled>加入房间</button>
<button onclick="sendAction('SIT_DOWN')" id="btnSit" disabled>坐下</button>
<button onclick="sendAction('CHECK')" id="btnCheck" disabled>过牌</button>
<button onclick="sendAction('CALL')" id="btnCall" disabled>跟注</button>
<button onclick="sendAction('RAISE')" id="btnRaise" disabled>加注</button>
<button onclick="sendAction('FOLD')" id="btnFold" disabled>弃牌</button>
<div id="log"></div>

<script>
    let ws = null;
    let PlayerActionRequest = null;
    let TableSnapshotResponse = null;
    let ServerMessage = null;

    const PROTO = `
syntax = "proto3";
package mercury.poker;
enum GameType {
  GAME_UNKNOWN = 0;
  TEXAS_HOLDEM = 1;
}
enum ActionType {
  ACTION_UNKNOWN = 0;
  JOIN_ROOM = 1;
  SIT_DOWN = 2;
  FOLD = 3;
  CHECK = 4;
  CALL = 5;
  RAISE = 6;
  CREATE_ROOM = 7;
  LIST_ROOMS = 8;
}
message PlayerActionRequest {
  ActionType action_type = 1;
  string room_id = 2;
  int32 seat_index = 3;
  int32 amount = 4;
  GameType game_type = 5;
  int32 max_seats = 6;
  int32 small_blind = 7;
  int32 big_blind = 8;
}
message RoomInfo {
  string room_id = 1;
  GameType game_type = 2;
  int32 max_seats = 3;
  int32 seated_count = 4;
  int32 small_blind = 5;
  int32 big_blind = 6;
}
message RoomListResponse {
  repeated RoomInfo rooms = 1;
}
message ServerMessage {
  TableSnapshotResponse table_snapshot = 1;
  RoomListResponse room_list = 2;
  RoomInfo room_created = 3;
}
message PlayerState {
  string user_id = 1;
  string username = 2;
  int32 seat_index = 3;
  int32 chips = 4;
  int32 current_bet = 5;
  bool is_folded = 6;
  bool is_all_in = 7;
  bool is_online = 8;
  repeated string hole_cards = 9;
}
message TableSnapshotResponse {
  string room_id = 1;
  int32 pot = 2;
  int32 current_max_bet = 3;
  int32 dealer_index = 4;
  int32 current_turn_index = 5;
  repeated string community_cards = 6;
  repeated PlayerState players = 7;
}
`;

    const ACTION_MAP = {
        JOIN_ROOM: 1,
        SIT_DOWN: 2,
        FOLD: 3,
        CHECK: 4,
        CALL: 5,
        RAISE: 6,
        CREATE_ROOM: 7,
        LIST_ROOMS: 8
    };

    const GAME_TYPE_MAP = {
        TEXAS_HOLDEM: 1
    };

    async function initProto() {
        const root = protobuf.parse(PROTO).root;
        PlayerActionRequest = root.lookupType('PlayerActionRequest');
        TableSnapshotResponse = root.lookupType('TableSnapshotResponse');
        ServerMessage = root.lookupType('ServerMessage');
    }

    initProto().catch(function (error) {
        log('[Proto 初始化失败] ' + error.message, 'err');
    });
    function log(msg, cls) {
        const el = document.getElementById('log');
        const line = document.createElement('div');
        line.textContent = msg;
        if (cls) line.className = cls;
        el.appendChild(line);
    }

    function connectWs() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            log('[提示] 连接已存在', 'ok');
            return;
        }
        ws = new WebSocket('ws://localhost:8888/ws');
        ws.binaryType = 'arraybuffer';

        ws.onopen = function () {
            log('[成功] WebSocket 已连接', 'ok');
            enableGameButtons(true);
        };
        ws.onerror = () => log('[错误] WebSocket 连接失败，请确认 IDEA 已启动 PokerNettyServer', 'err');
        ws.onclose = function () {
            log('[关闭] 连接已断开', 'err');
            enableGameButtons(false);
        };
        ws.onmessage = function (event) {
            if (!(event.data instanceof ArrayBuffer)) {
                log('[文本] ' + event.data);
                return;
            }
            try {
                const serverMessage = ServerMessage.decode(new Uint8Array(event.data));
                const messageObject = ServerMessage.toObject(serverMessage, { defaults: true });

                if (messageObject.tableSnapshot) {
                    log('[快照] ' + JSON.stringify(messageObject.tableSnapshot, null, 2), 'ok');
                    return;
                }
                if (messageObject.roomList) {
                    log('[房间列表] ' + JSON.stringify(messageObject.roomList, null, 2), 'ok');
                    return;
                }
                if (messageObject.roomCreated) {
                    log('[创建房间] ' + JSON.stringify(messageObject.roomCreated, null, 2), 'ok');
                    const createdRoomId = messageObject.roomCreated.roomId;
                    if (createdRoomId) {
                        document.getElementById('roomId').value = createdRoomId;
                    }
                    return;
                }
                log('[未知消息] ' + JSON.stringify(messageObject, null, 2));
            } catch (decodeError) {
                log('[解码失败] ' + decodeError.message, 'err');
            }
        };
    }
    function enableGameButtons(enabled) {
        ['btnCreate', 'btnList', 'btnJoin', 'btnSit', 'btnCheck', 'btnCall', 'btnRaise', 'btnFold'].forEach(function (buttonId) {
            document.getElementById(buttonId).disabled = !enabled;
        });
    }

    function sendAction(actionName) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            log('[错误] 请先连接', 'err');
            return;
        }

        const roomId = document.getElementById('roomId').value.trim();
        const seatIndex = parseInt(document.getElementById('seatIndex').value, 10) || 0;
        const raiseAmount = parseInt(document.getElementById('raiseAmount').value, 10) || 0;
        const maxSeats = parseInt(document.getElementById('maxSeats').value, 10) || 6;
        const smallBlind = parseInt(document.getElementById('smallBlind').value, 10) || 10;
        const bigBlind = parseInt(document.getElementById('bigBlind').value, 10) || 20;

        const payload = {
            actionType: ACTION_MAP[actionName],
            roomId: roomId,
            seatIndex: seatIndex,
            amount: actionName === 'RAISE' ? raiseAmount : 0
        };

        if (actionName === 'CREATE_ROOM') {
            payload.gameType = GAME_TYPE_MAP.TEXAS_HOLDEM;
            payload.maxSeats = maxSeats;
            payload.smallBlind = smallBlind;
            payload.bigBlind = bigBlind;
        }

        const verifyError = PlayerActionRequest.verify(payload);
        if (verifyError) {
            log('[编码校验失败] ' + verifyError, 'err');
            return;
        }

        const message = PlayerActionRequest.create(payload);
        const bytes = PlayerActionRequest.encode(message).finish();
        ws.send(bytes);

        log('[已发送] ' + actionName
            + ' room=' + roomId
            + ' seat=' + seatIndex
            + ' amount=' + payload.amount, 'ok');
    }

</script>
</body>
</html>
