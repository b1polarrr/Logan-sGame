# 阶段 4：Nginx + game-server + Redis（单机 compose，避免跨 Pod 进房失败）
#
# 全量启动（项目根目录）：
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# 只更新前端（改了 frontend/ 时）：
#   docker compose -f deploy/docker-compose.yml up -d --build nginx
#
# 只更新后端（改了 src/ 时）：
#   docker compose -f deploy/docker-compose.yml up -d --build game-server-1
#
# 多 Pod 压测（可选）：docker compose --profile multi-pod -f deploy/docker-compose.yml up -d
#
# 访问：http://localhost:8080
# WebSocket：ws://localhost:8080/ws
#
# 仅 Redis + MySQL（IDEA 本地开发）：
#   docker compose -f deploy/docker-compose.yml up -d redis mysql

name: poker_aa

services:
  redis:
    image: redis:7-alpine
    container_name: poker_aa-redis
    ports:
      - "6379:6379"
    volumes:
      - poker_aa_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: poker_aa-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-poker_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-poker_aa}
      MYSQL_USER: ${MYSQL_USER:-poker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-poker123}
    volumes:
      - poker_aa_mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-poker_root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # kafka:
  #   image: apache/kafka:3.7.0
  #   container_name: poker_aa-kafka
  #   hostname: kafka
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_NODE_ID: 1
  #     KAFKA_PROCESS_ROLES: broker,controller
  #     KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
  #     KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  #     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
  #     KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #     KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
  #     KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
  #     KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  #   restart: unless-stopped

  game-server-1:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.game-server
      args:
        REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    image: poker_aa-game-server:latest
    container_name: poker_aa-game-1
    environment:
      POD_NAME: game-server-1
      PORT: "8888"
      REDIS_URL: redis://redis:6379
      JDBC_URL: jdbc:mysql://mysql:3306/poker_aa?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      JDBC_USER: ${MYSQL_USER:-poker}
      JDBC_PASSWORD: ${MYSQL_PASSWORD:-poker123}
      # KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # KAFKA_EVENTS_TOPIC: poker.events
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      # kafka:
      #   condition: service_started
    restart: unless-stopped

  game-server-2:
    profiles: ["multi-pod"]
    image: poker_aa-game-server:latest
    container_name: poker_aa-game-2
    environment:
      POD_NAME: game-server-2
      PORT: "8888"
      REDIS_URL: redis://redis:6379
      JDBC_URL: jdbc:mysql://mysql:3306/poker_aa?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      JDBC_USER: ${MYSQL_USER:-poker}
      JDBC_PASSWORD: ${MYSQL_PASSWORD:-poker123}
      # KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # KAFKA_EVENTS_TOPIC: poker.events
    depends_on:
      game-server-1:
        condition: service_started
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      # kafka:
      #   condition: service_started
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
      args:
        REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    container_name: poker_aa-nginx
    ports:
      - "8080:80"
    depends_on:
      - game-server-1
    restart: unless-stopped

volumes:
  poker_aa_redis_data:
  poker_aa_mysql_data:
