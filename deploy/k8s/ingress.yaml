# Ingress：需集群已安装 Ingress Controller（如 nginx-ingress）
# Minikube: minikube addons enable ingress
# TLS 可选：见 ingress-tls.yaml 与 tls-secret 说明
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: poker-aa
  namespace: poker-aa
  labels:
    app.kubernetes.io/part-of: poker-aa
  annotations:
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: poker-route
    nginx.ingress.kubernetes.io/session-cookie-hash: sha1
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: poker.local
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: poker-aa-game-server
                port:
                  number: 8888
          - path: /
            pathType: Prefix
            backend:
              service:
                name: poker-aa-nginx
                port:
                  number: 80
