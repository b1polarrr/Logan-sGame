apiVersion: v1
kind: ConfigMap
metadata:
  name: poker-aa-mysql-init
  namespace: poker-aa
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id            BIGINT       NOT NULL AUTO_INCREMENT,
      user_id       VARCHAR(64)  NOT NULL,
      username      VARCHAR(32)  NOT NULL,
      password_hash VARCHAR(100) NOT NULL,
      created_at    TIMESTAMP    NOT NULL DEFAULT CURRENT_TIMESTAMP,
      PRIMARY KEY (id),
      UNIQUE KEY uk_users_user_id (user_id),
      UNIQUE KEY uk_users_username (username)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-aa-mysql
  namespace: poker-aa
  labels:
    app: poker-aa-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poker-aa-mysql
  template:
    metadata:
      labels:
        app: poker-aa-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: poker_root
            - name: MYSQL_DATABASE
              value: poker_aa
            - name: MYSQL_USER
              value: poker
            - name: MYSQL_PASSWORD
              value: poker123
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppoker_root"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppoker_root"]
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: poker-aa-mysql-init
---
apiVersion: v1
kind: Service
metadata:
  name: poker-aa-mysql
  namespace: poker-aa
  labels:
    app: poker-aa-mysql
spec:
  selector:
    app: poker-aa-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
