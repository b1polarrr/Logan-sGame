apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-aa-game-server
  namespace: poker-aa
  labels:
    app: poker-aa-game-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poker-aa-game-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: poker-aa-game-server
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: game-server
          image: poker-aa/game-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
              name: ws
          env:
            - name: PORT
              value: "8888"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_URL
              value: redis://poker-aa-redis:6379
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: poker-aa-kafka:9092
            - name: KAFKA_EVENTS_TOPIC
              value: poker.events
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 5
---
apiVersion: v1
kind: Service
metadata:
  name: poker-aa-game-server
  namespace: poker-aa
  labels:
    app: poker-aa-game-server
spec:
  selector:
    app: poker-aa-game-server
  ports:
    - name: ws
      port: 8888
      targetPort: ws
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: poker-aa-game-server
  namespace: poker-aa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: poker-aa-game-server
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
