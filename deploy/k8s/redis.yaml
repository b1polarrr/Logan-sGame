apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-aa-redis
  namespace: poker-aa
  labels:
    app: poker-aa-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poker-aa-redis
  template:
    metadata:
      labels:
        app: poker-aa-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          args:
            - redis-server
            - --appendonly
            - yes
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: poker-aa-redis
  namespace: poker-aa
  labels:
    app: poker-aa-redis
spec:
  selector:
    app: poker-aa-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
